    '5. Data Center',
    '6. Semiconductor',
    '7. Digital Content'
];

const container = document.getElementById('dashboard-sections');

orderedCategories.forEach((industry, idx) => {
    if (!macroData[industry]) return; // Skip if no data for category

    let admissionDataNum = labelYears.map(y => macroData[industry]["รับ"][y] || 0);
    let graduateDataNum = labelYears.map(y => {
        if (["2564", "2565", "2567", "2568"].includes(y)) return null; 
        return macroData[industry]["จบ"][y] || 0;
    });

    // Create Section HTML
    const section = document.createElement('div');
    section.className = 'section-card';
    
    // Header
    const header = document.createElement('div');
    header.className = 'section-title';
    header.innerHTML = `<h2>${industry}</h2> <button class="toggle-btn" onclick="toggleTable('table-zone-${idx}')">ดู/ซ่อน รายละเอียดรายหลักสูตร</button>`;
    section.appendChild(header);

    // Chart Area
    const chartDiv = document.createElement('div');
    chartDiv.className = 'chart-container';
    chartDiv.innerHTML = `<canvas id="chart-${idx}"></canvas>`;
    section.appendChild(chartDiv);

    // Table Area
    const tableDiv = document.createElement('div');
    tableDiv.id = `table-zone-${idx}`;
    tableDiv.className = 'table-container';
    
    // Build table HTML
    let tableHtml = `<table id="table-${idx}" class="display nowrap" style="width:100%">
        <thead>
            <tr>
                <th rowspan="2">รายชื่อหลักสูตร</th>
                <th colspan="10" style="text-align:center; border-left:1px solid #ccc;">รับเข้าศึกษา (ปี)</th>
                <th colspan="7" style="text-align:center; border-left:1px solid #ccc;">จบการศึกษา (ปี)</th>
            </tr>
            <tr>`;
    // Add sub-headers for each year
    [2559,2560,2561,2562,2563,2564,2565,2566,2567,2568].forEach(y => tableHtml += `<th style="border-left:1px solid #eee;">${y}</th>`);
    [2558,2559,2560,2561,2562,2563,2566].forEach(y => tableHtml += `<th style="border-left:1px solid #eee;">${y}</th>`);
    tableHtml += `</tr></thead><tbody>`;
    
    // Rows
    const courses = detailData[industry];
    for (const [courseName, dataType] of Object.entries(courses)) {
        tableHtml += `<tr><td>${courseName}</td>`;
        // รับ
        [2559,2560,2561,2562,2563,2564,2565,2566,2567,2568].forEach(y => {
            let val = dataType["รับ"] && dataType["รับ"][y.toString()] ? dataType["รับ"][y.toString()] : '-';
            tableHtml += `<td>${val}</td>`;
        });
        // จบ
        [2558,2559,2560,2561,2562,2563,2566].forEach(y => {
            let val = dataType["จบ"] && dataType["จบ"][y.toString()] ? dataType["จบ"][y.toString()] : '-';
            tableHtml += `<td>${val}</td>`;
        });
        tableHtml += `</tr>`;
    }
    
    tableHtml += `</tbody></table>`;
    tableDiv.innerHTML = tableHtml;
    section.appendChild(tableDiv);

    container.appendChild(section);

    // Initialize Chart
    let ctx = document.getElementById(`chart-${idx}`).getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labelYears,
            datasets: [
                {
                    label: 'รับเข้าศึกษา',
                    data: admissionDataNum,
                    backgroundColor: 'rgba(52, 152, 219, 0.7)',
                    borderColor: 'rgba(41, 128, 185, 1)',
                    borderWidth: 1,
                    order: 2
                },
                {
                    label: 'จบการศึกษา',
                    data: graduateDataNum,
                    type: 'line',
                    backgroundColor: 'rgba(231, 76, 60, 1)',
                    borderColor: 'rgba(192, 57, 43, 1)',
                    borderWidth: 2,
                    pointRadius: 4,
                    pointBackgroundColor: 'rgba(231, 76, 60, 1)',
                    spanGaps: true,
                    order: 1
                }
            ]
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            scales: {
                y: { beginAtZero: true, title: { display: true, text: 'จำนวนนักศึกษา (คน)' } },
                x: { title: { display: true, text: 'ปีการศึกษา' } }
            }
        }
    });

    // Initialize DataTable
    $(document).ready(function() {
        $(`#table-${idx}`).DataTable({
            scrollX: true,
            pageLength: 10,
            language: {
                search: "ค้นหาหลักสูตร:",
                lengthMenu: "แสดง _MENU_ รายการ",
                info: "กำลังแสดง _START_ ถึง _END_ จากทั้งหมด _TOTAL_ รายการ",
                paginate: {
                    first: "หน้าแรก",
                    last: "หน้าสุดท้าย",
                    next: "ถัดไป",
                    previous: "ก่อนหน้า"
                }
            }
        });
    });
});

function toggleTable(id) {
    const el = document.getElementById(id);
    if (el.style.display === 'block') {
        el.style.display = 'none';
    } else {
        el.style.display = 'block';
        // Need to realign columns because DataTables might calculate wrong width when hidden
        $($.fn.dataTable.tables(true)).DataTable().columns.adjust();
    }
}
</script>
</body>
</html>
